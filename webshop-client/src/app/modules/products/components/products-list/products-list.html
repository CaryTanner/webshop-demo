@if (!$products()) {
  <h2 class="loading">Loading products...</h2>
}

@if ($products() && $products()?.length === 0) {
  <h2 class="loading">No products found.</h2>
}

<ul class="products-list">
  @for (product of $products(); track product.id) {
    <li>
      <app-product-card [$product]="product" />
    </li>
  }
</ul>
