<div class="products-list-container">
  @if (!$products()) {
    <p>Loading products...</p>
  }

  @if ($products() && $products()?.length === 0) {
    <p>No products found.</p>
  }

  <ul class="products-list">
    @for (product of $products(); track product.id) {
      <li>
        <app-product-card [$product]="product" />
      </li>
    }
  </ul>
</div>
