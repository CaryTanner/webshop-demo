<div class="item-total-card">
  <div class="totals-row" aria-live="polite" aria-atomic="true">
    <div>
      <span>Subtotal</span>
      <span>{{ $cartTotal() | number: '1.2-2' }}</span>
    </div>
    <div>
      <span>Tax</span>
      <span>{{ $tax() | number: '1.2-2' }}</span>
    </div>
    <div>
      <span>Shipping</span>
      @if (typeof $shipping() === 'number') {
        {{ $shipping() | number: '1.2-2' }}
      } @else {
        {{ $shipping() }}
      }
    </div>
    <div>
      <span>Total</span>
      <span>{{ $cartTotal() | currency: 'USD' : 'symbol' : '1.2-2' }}</span>
    </div>
  </div>
  <ng-content> </ng-content>
</div>
