<a href="#main-content" class="skip-link">Skip to main content</a>
<div class="layout-container" [class.layout-is-mobile]="$isMobile()">
  <mat-toolbar class="layout-toolbar">
    <app-toolbar
      (toggleCart)="toggleShoppingCart()"
      (toggleSideNav)="snav.toggle()"
      (toggleLogin)="toggleLogin()"
      [$isLoggedIn]="$isLoggedIn()"
      [$numCartItems]="$numberCartItems()"
    />
  </mat-toolbar>

  <mat-sidenav-container
    class="layout-sidenav-container"
    [style.marginTop.px]="$isMobile() ? 56 : 0"
  >
    <mat-sidenav
      #snav
      [mode]="$isMobile() ? 'over' : 'side'"
      [fixedInViewport]="$isMobile()"
      [opened]="!$isMobile()"
      [fixedTopGap]="$isMobile() ? 44 : 52"
    >
      <mat-nav-list>
        <a
          mat-list-item
          [routerLink]="routePaths.products['base']"
          routerLinkActive="active-sidenav"
        >
          Products</a
        >
        <a
          mat-list-item
          [routerLink]="routePaths.authentication['base']"
          routerLinkActive="active-sidenav"
        >
          Account</a
        >
        <a mat-list-item [routerLink]="routePaths.orders['base']" routerLinkActive="active-sidenav"
          >Orders</a
        >
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <main id="main-content" tabindex="-1">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
